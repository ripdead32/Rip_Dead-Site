<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site - Downloads</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOIDUI TRANSITIONS ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;
}

body.void-enter{
  opacity:1;
  transform:translateY(0);
}

body.void-exit{
  opacity:0;
  transform:translateY(80px);
}

/* ================= VOID BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 40%,rgba(150,0,255,0.30),rgba(0,0,0,0.9),#000);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 60%,rgba(168,85,247,0.2),transparent 60%),
    radial-gradient(circle at 80% 30%,rgba(0,255,200,0.1),transparent 60%);
  filter:blur(50px);
}

/* ================= HEADER ================= */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.back{
  padding:10px 14px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:0.25s;
}

.back:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* ================= GRID ================= */

.container{
  display:flex;
  justify-content:center;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  width:min(900px,90%);
}

/* CARD */

.card{
  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(12px);

  border-radius:14px;
  padding:18px;

  border:1px solid rgba(255,255,255,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(168,85,247,0.25);
}

.card h3{
  margin:0;
}

/* BUTTON */

.download-btn{
  display:inline-block;
  margin-top:12px;

  padding:10px 12px;
  border-radius:10px;

  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;

  transition:0.25s;
}

.download-btn:hover{
  background:#c084fc;
  box-shadow:0 0 18px rgba(168,85,247,0.6);
}

/* FOOTER */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;

  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);

  border-top:1px solid rgba(255,255,255,0.05);

  font-size:14px;
  opacity:0.85;
}

footer a{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

footer a:hover{
  color:#c084fc;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div class="title">📦 Downloads</div>
  <a class="back" href="/">← Back Home</a>
</div>

<!-- DOWNLOAD GRID -->
<div class="container">
  <div class="grid" id="downloads"></div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Rip_Dead Studios™ —
  <a href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

/* ================= VOIDUI TRANSITIONS FIX ================= */

(function () {

  window.addEventListener("load", () => {
    requestAnimationFrame(() => {
      document.body.classList.add("void-enter");
    });
  });

  document.addEventListener("click", (e) => {
    const link = e.target.closest("a");

    if (!link) return;
    if (link.target === "_blank") return;
    if (link.href.includes("#")) return;

    e.preventDefault();

    document.body.classList.remove("void-enter");
    document.body.classList.add("void-exit");

    setTimeout(() => {
      window.location.href = link.href;
    }, 520);

  });

})();

/* ================= DOWNLOAD DATA (CMS STYLE READY) ================= */

const downloads = [
  {
    name: "Kahoot App v1.0",
    desc: "Stable release of Kahoot App",
    link: "https://github.com/ripdead32/Kahoot-App/releases/download/V1.0/Kahoot-App_Setup-v1.0.exe"
  },
  {
    name: "Kahoot App v1.2",
    desc: "Bug fixes and improvements",
    link: "https://github.com/ripdead32/Kahoot-App/releases/download/V1.2/Kahoot-App_Setup-v1.2.exe"
  },
  {
    name: "Kahoot ISO Image",
    desc: "Bootable install image",
    link: "https://github.com/ripdead32/Kahoot-App/releases/download/iso/KA-install-image.iso"
  },
  {
    name: "FNF Tutorial Remastered",
    desc: "Mod download package",
    link: "https://cdn-ripdead.kozow.com/apis/libraries/zip/tut-rem-v1.zip"
  }
];

/* ================= RENDER ================= */

const box = document.getElementById("downloads");

downloads.forEach(d => {
  box.innerHTML += `
    <div class="card">
      <h3>${d.name}</h3>
      <p style="opacity:0.7;">${d.desc}</p>

      <a class="download-btn" href="${d.link}" target="_blank">
        Download
      </a>
    </div>
  `;
});

/* ================= LOG ================= */

console.log(
  "%cVOIDUI DOWNLOADS LOADED",
  "color:#a855f7;font-weight:bold;"
);

</script>

</body>
</html>
