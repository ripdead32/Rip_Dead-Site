<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Not Found</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOIDUI TRANSITIONS ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:#04040a;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;

  overflow:hidden;
}

body.void-enter{
  opacity:1;
  transform:translateY(0);
}

body.void-exit{
  opacity:0;
  transform:translateY(80px);
}

/* ================= VOID BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 50% 40%,rgba(255,0,100,0.25),rgba(0,0,0,0.95),#000);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;

  background:
    radial-gradient(circle at 30% 30%,rgba(168,85,247,0.2),transparent 60%),
    radial-gradient(circle at 70% 70%,rgba(255,0,0,0.15),transparent 60%);

  filter:blur(60px);
}

/* ================= GLITCH TEXT ================= */

.glitch{
  font-size:72px;
  font-weight:bold;
  position:relative;
  animation:glitch 1.2s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,2px);}
  40%{transform:translate(2px,-2px);}
  60%{transform:translate(-2px,-1px);}
  80%{transform:translate(2px,2px);}
  100%{transform:translate(0);}
}

/* SECONDARY TEXT */

.text{
  opacity:0.7;
  margin-top:10px;
}

/* BUTTON */

.btn{
  margin-top:20px;
  padding:12px 16px;

  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;

  border-radius:10px;

  transition:0.25s;
}

.btn:hover{
  background:#c084fc;
  box-shadow:0 0 20px rgba(168,85,247,0.6);
}

/* STATIC GLITCH OVERLAY */

.glitch-overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;

  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );

  animation:scan 2s linear infinite;
  opacity:0.3;
}

@keyframes scan{
  0%{transform:translateY(0);}
  100%{transform:translateY(20px);}
}

</style>
</head>

<body>

<div class="glitch-overlay"></div>

<div class="glitch">404</div>

<div class="text">You are not supposed to be here..</div>
<div class="text" style="font-size:12px;opacity:0.5;">
It may have been deleted, corrupted, or never created
</div>

<a class="btn" href="/">Return Home</a>

<script>

/* ENTER TRANSITION */
window.addEventListener("load", () => {
  document.body.classList.add("void-enter");
});

/* EXIT TRANSITION */
document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", (e) => {

    if(a.target === "_blank") return;

    e.preventDefault();

    document.body.classList.remove("void-enter");
    document.body.classList.add("void-exit");

    setTimeout(() => {
      window.location.href = a.href;
    }, 520);

  });
});

console.log(
  "%c404 VOID DETECTED",
  "color:red;font-weight:bold;font-size:14px;"
);

</script>

</body>
</html>
