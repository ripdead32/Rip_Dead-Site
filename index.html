<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOIDUI TRANSITIONS ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;
}

body.void-enter{
  opacity:1;
  transform:translateY(0);
}

body.void-exit{
  opacity:0;
  transform:translateY(80px);
}

/* ================= VOID BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 40%,rgba(150,0,255,0.30),rgba(0,0,0,0.9),#000);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 60%,rgba(168,85,247,0.2),transparent 60%),
    radial-gradient(circle at 80% 30%,rgba(0,255,200,0.1),transparent 60%);
  filter:blur(50px);
}

/* ================= NAVBAR v2 ================= */

.navbar{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 28px;

  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.05);

  transition:0.3s ease;
}

.navbar.hidden{
  transform:translateY(-100%);
}

.nav-logo{
  font-weight:bold;
  font-size:18px;
  color:#fff;
  text-decoration:none;
}

.nav-links{
  display:flex;
  gap:8px;
}

.nav-links a{
  position:relative;

  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:10px 14px;
  border-radius:10px;

  color:#fff;
  text-decoration:none;
  font-weight:500;

  transition:0.25s;
  overflow:hidden;
}

.nav-links a:hover{
  background:rgba(168,85,247,0.15);
  color:#c084fc;
}

.nav-links a.active{
  background:rgba(168,85,247,0.25);
  box-shadow:0 0 12px rgba(168,85,247,0.4);
}

/* underline glow */
.nav-links a::after{
  content:"";
  position:absolute;
  bottom:4px;
  left:50%;
  width:0%;
  height:2px;
  background:#a855f7;
  transition:0.3s ease;
  transform:translateX(-50%);
}

.nav-links a:hover::after{
  width:70%;
}

@media(max-width:700px){
  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
  }
}

/* ================= HERO ================= */

.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  font-size:18px;
  opacity:0.8;
  margin-top:10px;
}

/* ================= SOCIAL CARDS ================= */

.container{
  display:flex;
  justify-content:center;
  margin-top:50px;
}

.card{
  width:360px;
  padding:30px;

  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(14px);

  border-radius:16px;
  text-align:center;

  border:1px solid rgba(255,255,255,0.06);

  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 35px rgba(168,85,247,0.25);
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

.btn{
  padding:12px;
  border-radius:10px;

  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;

  transition:0.25s;
}

.btn:hover{
  background:#c084fc;
  box-shadow:0 0 18px rgba(168,85,247,0.6);
}

/* ================= FOOTER ================= */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;

  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);

  border-top:1px solid rgba(255,255,255,0.05);

  font-size:14px;
  opacity:0.85;
}

footer a{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

footer a:hover{
  color:#c084fc;
}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar" id="navbar">

  <a class="nav-logo" href="/">Rip_Dead Site</a>

  <div class="nav-links">
    <a href="/" data-page="home">Home</a>
    <a href="/art/" data-page="art">Art</a>
    <a href="/downloads/" data-page="downloads">Downloads</a>
    <a href="/blogs/" data-page="blogs">Blogs</a>
    <a href="/techintoall/" data-page="techintoall">TechIntoAll</a>
  </div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <h1>Welcome to Rip_Dead Site</h1>
  <p>Explore the vast creations of Rip_Dead and his Socials!</p>
</div>

<!-- ================= SOCIALS ================= -->
<div class="container">
  <div class="card">

    <h2>Socials</h2>

    <div class="buttons">
      <a class="btn" href="https://x.com/rip_dead32">X (Twitter)</a>
      <a class="btn" href="https://youtube.com/rip_deadd">YouTube</a>
      <a class="btn" href="https://www.reddit.com/u/rip_dead32/">Reddit</a>
    </div>

  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer>
  © 2026 Rip_Dead Studios™ —
  <a href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

/* ENTER */
window.addEventListener("DOMContentLoaded",()=>{
  document.body.classList.add("void-enter");
  setActiveNav();
});

/* EXIT TRANSITIONS */
document.querySelectorAll("a").forEach(a=>{
  a.addEventListener("click",(e)=>{

    if(a.target==="_blank") return;

    e.preventDefault();

    document.body.classList.add("void-exit");

    setTimeout(()=>{
      window.location=a.href;
    },500);

  });
});

/* ACTIVE NAV DETECTION */
function setActiveNav(){
  const path = window.location.pathname;

  document.querySelectorAll(".nav-links a").forEach(a=>{
    if(path === "/" && a.dataset.page === "home") a.classList.add("active");
    if(path.includes("/art") && a.dataset.page === "art") a.classList.add("active");
    if(path.includes("/downloads") && a.dataset.page === "downloads") a.classList.add("active");
    if(path.includes("/blogs") && a.dataset.page === "blogs") a.classList.add("active");
  });
}

/* SCROLL HIDE NAVBAR */
let lastScroll = 0;
const navbar = document.getElementById("navbar");

window.addEventListener("scroll",()=>{
  const current = window.pageYOffset;

  if(current > lastScroll && current > 80){
    navbar.classList.add("hidden");
  } else {
    navbar.classList.remove("hidden");
  }

  lastScroll = current;
});

/* CONSOLE WARNING */
console.log(
  "%cSTOP! DO NOT INSERT ANYTHING HERE! IT COULD BREAK THE SITE!",
  "color:#fff;background:#a855f7;padding:6px;border-radius:6px;"
);

</script>

</body>
</html>
