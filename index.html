<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site</title>
<link rel="icon" href="favicon.ico">

<style>

/* =========================================================
   VOIDUI BASE
========================================================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  background:#04040a;
}

/* ================= VOID BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-3;

  background:
    radial-gradient(circle at 50% 40%,
      rgba(150, 0, 255, 0.30) 0%,
      rgba(10, 0, 25, 0.85) 55%,
      #000 100%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 20% 70%,
      rgba(170, 0, 255, 0.18),
      transparent 60%),
    radial-gradient(circle at 80% 30%,
      rgba(120, 0, 200, 0.15),
      transparent 55%);

  filter:blur(50px);
  opacity:0.9;
}

.void-glow{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:70vh;
  z-index:-1;
  pointer-events:none;

  background:linear-gradient(
    to top,
    rgba(0, 255, 200, 0.18),
    transparent
  );

  filter:blur(90px);
  opacity:0.8;
}

/* =========================================================
   NAVBAR (VOIDUI INTEGRATED)
========================================================= */

.navbar{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 28px;

  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav-logo{
  font-weight:bold;
  font-size:18px;
  color:#fff;
  text-decoration:none;
  letter-spacing:0.5px;
}

.nav-links{
  display:flex;
  gap:18px;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
  font-weight:500;

  transition:0.25s;
  position:relative;
}

.nav-links a:hover{
  color:#c084fc;
  text-shadow:0 0 10px rgba(168,85,247,0.6);
}

/* =========================================================
   TRANSITIONS
========================================================= */

.void-enter{
  opacity:0;
  transform:translateY(70px);
  animation:voidIn 0.75s ease forwards;
}

@keyframes voidIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.void-exit{
  animation:voidOut 0.55s ease forwards;
}

@keyframes voidOut{
  to{
    opacity:0;
    transform:translateY(90px);
  }
}

/* =========================================================
   HERO
========================================================= */

.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  font-size:18px;
  opacity:0.8;
  margin-top:10px;
}

/* =========================================================
   CARD SYSTEM
========================================================= */

.container{
  display:flex;
  justify-content:center;
  margin-top:50px;
}

.card{
  width:360px;
  padding:30px;

  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(14px);

  border-radius:16px;
  text-align:center;

  border:1px solid rgba(255,255,255,0.06);

  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 35px rgba(168,85,247,0.25);
}

/* =========================================================
   BUTTONS
========================================================= */

.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

.btn{
  padding:12px;
  border-radius:10px;

  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;

  transition:0.25s;
}

.btn:hover{
  background:#c084fc;
  transform:scale(1.05);
  box-shadow:0 0 18px rgba(168,85,247,0.6);
}

/* =========================================================
   FOOTER
========================================================= */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;

  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);

  border-top:1px solid rgba(255,255,255,0.05);

  font-size:14px;
  opacity:0.85;
}

.open-source{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

.open-source:hover{
  color:#c084fc;
  text-shadow:0 0 14px #a855f7;
}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:768px){
  .navbar{
    flex-direction:column;
    gap:10px;
  }
}

</style>
</head>

<body>

<div class="void-glow"></div>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

  <a class="nav-logo" href="/">Rip_Dead Site</a>

  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/art/">Art</a>
    <a href="/downloads/">Downloads</a>
    <a href="/support/">Support</a>
    <a href="/blogs/">Blogs</a>
  </div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <h1>Welcome to Rip_Dead Site</h1>
  <p>Explore the vast creations of Rip_Dead and his Socials!</p>
</div>

<!-- ================= SOCIAL CARD ================= -->
<div class="container">
  <div class="card">

    <h2>Socials</h2>

    <div class="buttons">
      <a class="btn" href="https://x.com/rip_dead32">X (Twitter)</a>
      <a class="btn" href="https://www.youtube.com/@ripdeadYT">YouTube</a>
      <a class="btn" href="https://www.reddit.com/u/rip_dead32/">Reddit</a>
    </div>

  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer>
  © 2026 Rip_Dead Studios™ — 
  <a class="open-source" href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

/* ENTER */
window.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("void-enter");
});

/* EXIT TRANSITION */
document.addEventListener("click", (e) => {
  const link = e.target.closest("a");

  if(!link) return;
  if(link.target === "_blank") return;

  e.preventDefault();

  document.body.classList.remove("void-enter");
  document.body.classList.add("void-exit");

  setTimeout(() => {
    window.location.href = link.href;
  }, 550);
});

/* CONSOLE WARNING */
console.log(
  "%cSTOP! DO NOT INSERT ANYTHING HERE! IT COULD BREAK THE SITE!",
  "color:#fff;background:#a855f7;padding:6px;border-radius:6px;font-size:14px;"
);

</script>

</body>
</html>
