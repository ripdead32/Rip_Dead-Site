<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site - Art</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOIDUI TRANSITIONS ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;
}

body.void-enter{
  opacity:1;
  transform:translateY(0);
}

body.void-exit{
  opacity:0;
  transform:translateY(80px);
}

/* ================= VOID BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 40%,rgba(150,0,255,0.30),rgba(0,0,0,0.9),#000);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 60%,rgba(168,85,247,0.2),transparent 60%),
    radial-gradient(circle at 80% 30%,rgba(0,255,200,0.1),transparent 60%);
  filter:blur(50px);
}

/* ================= HEADER ================= */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.back{
  padding:10px 14px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:0.25s;
}

.back:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* ================= ART GRID ================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(20,20,20,0.55);
  border-radius:14px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(168,85,247,0.25);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* ================= FOOTER ================= */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.05);
  font-size:14px;
  opacity:0.85;
}

footer a{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

footer a:hover{
  color:#c084fc;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div class="title">🎨 Art</div>
  <a class="back" href="/">← Back Home</a>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- FOOTER -->
<footer>
  © 2026 Rip_Dead Studios™ —
  <a href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

/* ================= ENTER FIX (IMPORTANT) ================= */

window.addEventListener("load", () => {
  document.body.classList.add("void-enter");
  loadArt();
});

/* ================= EXIT FIX (GLOBAL SAFE) ================= */

document.addEventListener("click", (e) => {
  const link = e.target.closest("a");

  if (!link) return;
  if (link.target === "_blank") return;
  if (link.href.includes("#")) return;

  e.preventDefault();

  document.body.classList.remove("void-enter");
  document.body.classList.add("void-exit");

  setTimeout(() => {
    window.location.href = link.href;
  }, 520);
});

/* ================= ART DATA ================= */

const art = [
  {
    name: "Rip_Dead FNF",
    file: "/images/rip-fnf.png",
    size: "728 KB",
    tags: ["Funkin"]
  }
];

/* ================= RENDER ================= */

function loadArt(){
  const grid = document.getElementById("grid");

  art.forEach(a=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${a.file}" alt="${a.name}">
        <h3>${a.name}</h3>
        <div style="opacity:0.6;font-size:12px;">${a.size}</div>
        <div style="opacity:0.5;font-size:12px;">${a.tags.join(", ")}</div>
      </div>
    `;
  });
}

/* ================= SAFETY LOG ================= */

console.log(
  "%cVOIDUI ART LOADED",
  "color:#a855f7;font-weight:bold;"
);

</script>

</body>
</html>
